# Configurações gerais da aplicação
spring.application.name=praio-backend
server.port=8080

# URI do MongoDB lida do arquivo .env via spring-dotenv
spring.data.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.database=praio-pg

# APIs externas — centralizadas no backend (nunca no frontend)
api.open-meteo.clima.url=https://api.open-meteo.com/v1/forecast
api.open-meteo.marine.url=https://marine-api.open-meteo.com/v1/marine
api.cetesb.qualar.url=${CETESB_QUALAR_URL:https://qualar1.cetesb.sp.gov.br/qualar/autenticacao.do}
api.cetesb.usuario=${CETESB_USUARIO:}
api.cetesb.senha=${CETESB_SENHA:}
# Código da estação CETESB — 72=Cubatão-Centro (padrão), 27=Santos
api.cetesb.estacao-codigo=${CETESB_ESTACAO_CODIGO:72}
# ArcGIS Feature Layer público — classificação semanal de balneabilidade
api.cetesb.arcgis.url=${API_CETESB_ARCGIS_URL:https://arcgis.cetesb.sp.gov.br/server/rest/services/Hosted/Praias/FeatureServer/0}

# AQICN — qualidade do ar via dados CETESB (estação Santos, ~30 km de Praia Grande)
# Sem token a qualidade do ar retorna null — não derruba a aplicação
api.aqicn.token=${AQICN_TOKEN:}
api.aqicn.estacao=${AQICN_ESTACAO:santos}
api.aqicn.distancia-km=${AQICN_DISTANCIA_KM:30}

# TTL do cache de dados externos (em minutos)
praio.cache.ttl-minutos=30

# JWT — secret e expiração lidos do .env
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# Upload de fotos de perfil
praio.uploads.dir=${UPLOADS_DIR:uploads}
server.tomcat.max-http-form-post-size=10MB
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Fuso horário — America/Sao_Paulo (BRT = UTC-3)
# Garante que datas no JSON saiam com offset -03:00 em vez de +00:00
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.serialization.write-dates-as-timestamps=false

# Configurações de log
logging.level.com.praio=DEBUG
logging.level.org.springframework.data.mongodb=INFO

# DevTools — aguarda 2s de "silêncio" no classpath antes de reiniciar,
# evitando restart falso no meio do rebuild do IntelliJ (deletions → additions)
spring.devtools.restart.quiet-period=2000
spring.devtools.restart.poll-interval=3000
